services:
  postgres:
    image: postgres:16-alpine
    container_name: tenet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tenet
      POSTGRES_PASSWORD: tenet
      POSTGRES_DB: tenet
    ports:
      - "5432:5432"
    volumes:
      - tenet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenet -d tenet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tenet_postgres_data:
