services:
  postgres:
    image: postgres:16-alpine
    container_name: kanall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanall
      POSTGRES_PASSWORD: kanall
      POSTGRES_DB: kanall
    ports:
      - "5432:5432"
    volumes:
      - kanall_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanall -d kanall"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kanall_postgres_data:
